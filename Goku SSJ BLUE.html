<html>
  <head>
    <title>Goku SSJ BLUE - ULTRA</title>

    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        background: black;
        text-align: center;
        color: white;
        font-family: Arial;
      }

      .contenedor {
        width: 400px;
        height: 200px;
        margin: 20px auto;
        border: 1px solid #222;
        background: radial-gradient(circle, #000 60%, #020617);
        position: relative;
        overflow: hidden;
      }

      /* GOKU */
      .cuadrito_img {
        position: absolute;
        top: 50%;
        left: 20px;
        transform: translateY(-50%);
        animation: flotar 2s infinite ease-in-out;
      }

      .cuadrito_img img {
        width: 100px;
        transform: scaleX(-1);
        filter: drop-shadow(0 0 10px cyan)
                drop-shadow(0 0 25px blue)
                drop-shadow(0 0 40px cyan);
      }

      /* AURA */
      .aura {
        position: absolute;
        top: 50%;
        left: 20px;
        width: 120px;
        height: 120px;
        transform: translateY(-50%);
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0,255,255,0.4), transparent 70%);
        animation: aura 2s infinite ease-in-out;
        filter: blur(10px);
      }

      @keyframes aura {
        0% { transform: translateY(-50%) scale(1); opacity: 0.6; }
        50% { transform: translateY(-50%) scale(1.2); opacity: 1; }
        100% { transform: translateY(-50%) scale(1); opacity: 0.6; }
      }

      @keyframes flotar {
        0% {
          transform: translateY(-50%) translateY(-5px) rotate(-4deg);
        }
        50% {
          transform: translateY(-50%) translateY(5px) rotate(4deg);
        }
        100% {
          transform: translateY(-50%) translateY(-5px) rotate(-4deg);
        }
      }

      /* ESTRELLAS */
      .estrella {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: mover linear infinite, parpadear 1.5s infinite alternate;
      }

      @keyframes mover {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-450px);
        }
      }

      @keyframes parpadear {
        from { opacity: 0.2; }
        to { opacity: 1; }
      }

      /* CAPAS */
      .c1 { width: 2px; height: 2px; animation-duration: 4s; }
      .c2 { width: 4px; height: 4px; animation-duration: 2.5s; }
      .c3 { width: 6px; height: 6px; animation-duration: 1.5s; box-shadow: 0 0 8px white; }

      /* POSICIONES + DELAYS (CLAVE) */
      .e1 { top: 10px; left: 400px; animation-delay: 0s; }
      .e2 { top: 30px; left: 380px; animation-delay: 0.5s; }
      .e3 { top: 50px; left: 360px; animation-delay: 1s; }
      .e4 { top: 70px; left: 340px; animation-delay: 1.5s; }
      .e5 { top: 90px; left: 320px; animation-delay: 2s; }

      .e6 { top: 110px; left: 300px; animation-delay: 0.3s; }
      .e7 { top: 130px; left: 280px; animation-delay: 0.8s; }
      .e8 { top: 150px; left: 260px; animation-delay: 1.3s; }
      .e9 { top: 170px; left: 240px; animation-delay: 1.8s; }
      .e10 { top: 190px; left: 220px; animation-delay: 2.3s; }

      .e11 { top: 20px; left: 200px; animation-delay: 0.2s; }
      .e12 { top: 40px; left: 180px; animation-delay: 0.7s; }
      .e13 { top: 60px; left: 160px; animation-delay: 1.2s; }
      .e14 { top: 80px; left: 140px; animation-delay: 1.7s; }
      .e15 { top: 100px; left: 120px; animation-delay: 2.2s; }

      .e16 { top: 120px; left: 100px; animation-delay: 0.4s; }
      .e17 { top: 140px; left: 80px; animation-delay: 0.9s; }
      .e18 { top: 160px; left: 60px; animation-delay: 1.4s; }
      .e19 { top: 180px; left: 40px; animation-delay: 1.9s; }
      .e20 { top: 50px; left: 20px; animation-delay: 2.4s; }

      .e21 { top: 30px; left: 350px; animation-delay: 0.6s; }
      .e22 { top: 70px; left: 310px; animation-delay: 1.1s; }
      .e23 { top: 110px; left: 270px; animation-delay: 1.6s; }
      .e24 { top: 150px; left: 230px; animation-delay: 2.1s; }
      .e25 { top: 190px; left: 190px; animation-delay: 2.6s; }

      .e26 { top: 25px; left: 150px; animation-delay: 0.1s; }
      .e27 { top: 65px; left: 110px; animation-delay: 0.6s; }
      .e28 { top: 105px; left: 70px; animation-delay: 1.1s; }
      .e29 { top: 145px; left: 30px; animation-delay: 1.6s; }
      .e30 { top: 185px; left: 10px; animation-delay: 2.1s; }

    </style>
