<html>
<head>
    <title>ANIMACION 3 CSS</title>
    <style>

        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative; /*para centrar el div*/
            margin: 0 auto; /*para centrar el div*/

            overflow: hidden; /*muestra solo lo interior*/

            background-color: black;

        }

        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: rgb(237, 216, 216);
            position: absolute; /*permite mover el div dentro del cuadrito*/

            top: 100px;  /* de arriba hacia abajo "top"*/ 
            left: 200px; /* de izquierda a derecha*/

            animation: cuadrito 1s infinite linear;
        }

        @keyframes cuadrito{
            from{
                
                top: -100px;
                left: -100px;
            }
            to{
                
                
                top: 300px;
                left: 500px;

            }
        }
        .cuadrito img{
            width: 100px;
            height: 100px;
        }

    </style>

</head>
<body>

    <h1>Dialonal</h1>
    <div class= "contenedor">

        <div class="cuadrito">
            <img src="img/megamanx.gif" alt="">
        </div>

    </div>

        <a href="index.html">Volver</a>




</body>
</html>
