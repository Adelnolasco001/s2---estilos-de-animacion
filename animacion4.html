<html>
<head>
    <title>Animación Megaman </title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background: #0b0f1a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1{
            margin: 20px;
        }

        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid #222;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
            background: black;
        }

        .megaman{
            position: absolute;
            left: 40px;
            bottom: 20px;
            animation: vibrar 0.3s infinite;
        }

        .megaman img{
            width: 100px;
            filter: drop-shadow(0 0 10px cyan);
        }

        @keyframes vibrar{
            0%{ transform: translateY(0px); }
            50%{ transform: translateY(-2px); }
            100%{ transform: translateY(0px); }
        }

        /* suelo en movimiento */
        .suelo{
            position: absolute;
            bottom: 0;
            width: 800px;
            height: 20px;
            background: gray;
            animation: moverSuelo 2s linear infinite;
        }

        @keyframes moverSuelo{
            from{ left: 0; }
            to{ left: -400px; }
        }

        /* obstaculos  */
        .bloque{
            position: absolute;
            bottom: 20px;
            width: 20px;
            height: 20px;
            background: red;
            animation: moverBloques 2s linear infinite;
        }

        @keyframes moverBloques{
            from{ left: 400px; }
            to{ left: -20px; }
        }

        /* variacion de velocidades */
        .b1{ animation-delay: 0s; }
        .b2{ animation-delay: 1s; }

        /* disparos  */
        .bala{
            position: absolute;
            left: 120px;
            bottom: 60px;
            width: 10px;
            height: 4px;
            background: cyan;
            animation: disparo 1s linear infinite;
        }

        @keyframes disparo{
            from{ left: 120px; }
            to{ left: 400px; }
        }

    </style>
</head>

<body>

    <h1>Megaman X PRO</h1>

    <div class="contenedor">

        <div class="suelo"></div>

        <div class="bloque b1"></div>
        <div class="bloque b2"></div>

        <div class="bala"></div>

        <div class="megaman">
            <img src="img/megamanx.gif">
        </div>

    </div>

    <br>
    <a href="index.html">Volver</a>

</body>
</html>
